# T076 / US4 — Prism mock of the Anthropic Messages API.
# Deliberately minimal: one POST /v1/messages endpoint with an example
# response. Integration tests can override by hitting Prism's examples
# endpoint or by spinning up their own mock server on a different port.

openapi: 3.0.0
info:
  title: Mock Anthropic Messages (for ATW integration tests)
  version: "0.1.0"
servers:
  - url: http://localhost:4010

paths:
  /v1/messages:
    post:
      operationId: createMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Fake assistant reply
          content:
            application/json:
              schema:
                type: object
              examples:
                grounded:
                  summary: Grounded response with product citations
                  value:
                    id: msg_mock_001
                    type: message
                    role: assistant
                    model: claude-opus-4-7
                    stop_reason: end_turn
                    content:
                      - type: text
                        text: |
                          Para filtro en V60 con perfil chocolatoso, te recomiendo
                          el **Colombia Huila — Pulped Natural** (notas de cereza
                          roja, cocoa y panela) y el **Kenya Karundul AA**
                          (blackcurrant, tomate, azúcar moreno). Ambos brillan a
                          un tueste medium-light.
                    usage:
                      input_tokens: 600
                      output_tokens: 120
                action:
                  summary: Tool-use emission for add_to_cart
                  value:
                    id: msg_mock_002
                    type: message
                    role: assistant
                    model: claude-opus-4-7
                    stop_reason: tool_use
                    content:
                      - type: text
                        text: Preparando tu carrito…
                      - type: tool_use
                        id: toolu_01
                        name: add_to_cart
                        input:
                          cart_id: cart_demo_001
                          variant_id: var_prod_col_huila_001_250g
                          quantity: 2
                          product_title: "Colombia Huila — Pulped Natural"
                          price_preview: "€19.90 × 2 = €39.80"
                    usage:
                      input_tokens: 700
                      output_tokens: 45
