# atw-shop-host docker-compose.yml
#
# Self-contained runtime for an ATW host project. This is what an
# external integrator gets when they run `npx create-atw` and follow
# the `/atw.*` flow — no other compose file should be needed.
#
# The block between `# atw:begin services` and `# atw:end services` is
# OWNED by /atw.build's COMPOSE phase. Manual edits inside that block
# will be overwritten on the next build. Edit outside the markers, or
# rebuild and let ATW regenerate.
#
# Required env in the shell that runs `docker-compose up`:
#   ANTHROPIC_API_KEY — your Anthropic key for Claude Opus.

name: atw-shop-host

# ----- atw:begin -----
services:
  atw_postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: atw
      POSTGRES_USER: atw
      POSTGRES_PASSWORD: atw
    ports:
      - "5433:5432"
    volumes:
      - atw_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atw -d atw"]
      interval: 5s
      timeout: 3s
      retries: 10

  atw_backend:
    image: atw_backend:latest
    environment:
      DATABASE_URL: postgres://atw:atw@atw_postgres:5432/atw
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ALLOWED_ORIGINS: http://localhost:8080
      LOG_LEVEL: info
      NODE_ENV: production
    depends_on:
      atw_postgres:
        condition: service_healthy
    ports:
      - "3100:3100"
    healthcheck:
      test:
        ["CMD", "/nodejs/bin/node", "-e", "fetch('http://localhost:3100/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 12

volumes:
  atw_pg_data:
# ----- atw:end -----
