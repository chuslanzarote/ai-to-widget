server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Reverse-proxy /api/* → shop_backend:3200/*, stripping the /api prefix.
  # This keeps the browser same-origin (no CORS needed) and lets the
  # frontend talk to the backend through the Docker network.
  location /api/ {
    proxy_pass http://shop_backend:3200/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback: every non-asset path returns index.html so React Router
  # can handle client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
