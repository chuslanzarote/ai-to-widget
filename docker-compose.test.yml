# T076 / US4 — Test overlay for docker-compose.
# Contract: specs/003-runtime/contracts/compose.md §7.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up --wait
#
# Differences from the default compose:
# - `atw_backend` points at a mock Anthropic server for deterministic tests.
# - Rate limit lowered so tests can exercise 429 behaviour quickly.
# - atw_postgres init script disabled; each test seeds its own fixtures.
# - Medusa seeder marker is reset on each up so seeds run fresh.

services:
  atw_backend:
    environment:
      ANTHROPIC_API_KEY: test-key-no-real-calls
      ANTHROPIC_BASE_URL: http://atw_mock_anthropic:4010
      RATE_LIMIT_MAX: "3"
      RATE_LIMIT_WINDOW_MS: "60000"
      LOG_LEVEL: debug
      NODE_ENV: test

  atw_postgres:
    # Disable the init-script import so tests seed their own atw_documents.
    volumes:
      - atw_pg_data:/var/lib/postgresql/data

  atw_mock_anthropic:
    image: stoplight/prism:5
    command: ["mock", "-h", "0.0.0.0", "-p", "4010", "/mocks/anthropic-messages.yaml"]
    volumes:
      - ./tests/fixtures/mock-anthropic/anthropic-messages.yaml:/mocks/anthropic-messages.yaml:ro

  medusa_backend:
    environment:
      MEDUSA_ADMIN_ONBOARDING_TYPE: ""
      SEED_RESET_ON_BOOT: "true"

  medusa_storefront:
    environment:
      NEXT_PUBLIC_ATW_BACKEND_URL: http://localhost:3100
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://localhost:9000
