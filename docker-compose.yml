# AI to Widget — top-level Docker Compose orchestration.
#
# Service graph documented in specs/003-runtime/contracts/compose.md §1.
#
# NOTE ON DIGESTS: image digests are placeholders for public images in this
# pre-implementation revision. Feature 006 / release prep MUST resolve each
# `<digest>` placeholder to the exact `sha256:...` value from Docker Hub
# before publishing the demo. Principle VIII requires this pin.

name: ai-to-widget

# Feature 007 — the Medusa testbed (medusa_postgres, medusa_redis,
# medusa_backend, medusa_storefront, medusa_pg_data) was retired and
# replaced by the self-contained reference ecommerce under `demo/shop`,
# which has its own compose file at `demo/shop/docker-compose.yml`.

services:
  atw_postgres:
    image: pgvector/pgvector:pg16  # TODO(compose-digest): pin @sha256:<digest>
    environment:
      POSTGRES_DB: atw
      POSTGRES_USER: atw
      POSTGRES_PASSWORD: atw_local
    ports:
      - "5433:5432"
    volumes:
      - atw_pg_data:/var/lib/postgresql/data
      - ./demo/atw-shop-host/atw.sql:/docker-entrypoint-initdb.d/atw.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atw -d atw"]
      interval: 5s
      timeout: 3s
      retries: 10

  atw_backend:
    image: atw_backend:latest
    environment:
      DATABASE_URL: postgres://atw:atw_local@atw_postgres:5432/atw
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ALLOWED_ORIGINS: http://localhost:8000,http://localhost:8080
      # Feature 007 — atw_backend no longer reaches the shop API.
      # HOST_API_BASE_URL and HOST_API_KEY are removed (Principle I;
      # see specs/007-widget-tool-loop/contracts/chat-endpoint-v2.md).
      LOG_LEVEL: info
      NODE_ENV: production
    depends_on:
      atw_postgres:
        condition: service_healthy
    ports:
      - "3100:3100"
    healthcheck:
      test:
        ["CMD", "/nodejs/bin/node", "-e", "fetch('http://localhost:3100/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 12

volumes:
  atw_pg_data:
